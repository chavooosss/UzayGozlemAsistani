name: Android CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

permissions:
  contents: write # tag push'unda APK'yı release'e ekleyebilmek için

jobs:
  build:
    name: Release APK derle
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: JDK 17 kur
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Gradle kur (önbellekli)
        uses: gradle/actions/setup-gradle@v4

      - name: Derle
        run: ./gradlew assembleRelease

      - name: APK'yı sürüm adıyla kopyala
        run: cp app/build/outputs/apk/release/app-release.apk "UzayGozlem-${GITHUB_REF_NAME}.apk"

      - name: APK'yı iş çıktısı olarak sakla
        uses: actions/upload-artifact@v4
        with:
          name: UzayGozlem-apk
          path: UzayGozlem-*.apk

      # v* etiketi push'lanınca APK otomatik olarak GitHub Release'e eklenir.
      - name: Release'e ekle
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: UzayGozlem-*.apk
